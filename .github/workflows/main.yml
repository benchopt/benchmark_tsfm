name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every 1st of the month at 7:42am UTC.
    - cron:  '42 7 1 * *'

jobs:
  benchopt_dev:
    uses: benchopt/template_benchmark/.github/workflows/test_benchmarks.yml@main
    with:
      benchopt_branch: benchopt@main
      cache_dir: ./data
  benchopt_release:
    uses: benchopt/template_benchmark/.github/workflows/test_benchmarks.yml@main
    with:
      benchopt_version: latest
  lint:
    uses: benchopt/template_benchmark/.github/workflows/lint_benchmarks.yml@main
    with:
      linter: ruff
  leakage_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install numpy scikit-learn pytest benchopt
      - name: Run leakage probe tests
        # ``python -m pytest`` (not the bare ``pytest`` script) puts the repo
        # root on sys.path, so ``import benchmark_utils`` resolves to the real
        # package rather than the ``tests/benchmark_utils`` test directory.
        run: python -m pytest tests/test_leakage.py tests/test_objective_leakage.py -v
  type_check:
    runs-on: ubuntu-latest
    # Advisory only: this job never fails (so it never blocks a merge). pyright
    # findings are surfaced as warning annotations (orange) instead of a red
    # check. Installs every lightweight dependency (no torch) so benchmark_utils/,
    # datasets/ and objective.py are fully type-checked; the torch-based model
    # solvers stay unresolved (reportMissingImports is muted for solvers/ in
    # pyproject.toml).
    # The pyright step already exits 0; continue-on-error is a belt-and-suspenders
    # so even an install/infra hiccup can never fail the run.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        # Lightweight deps only — the model solvers' torch/chronos/momentfm/etc.
        # are intentionally skipped to keep this job fast.
        run: >
          pip install pyright numpy scikit-learn benchopt aeon
          pandas tslearn huggingface_hub fsspec pooch tqdm wfdb
      - name: Run pyright (advisory — emits warnings, never fails)
        run: |
          pyright --outputjson > pyright.json || true
          python - <<'PY'
          import json, pathlib
          data = json.loads(pathlib.Path("pyright.json").read_text() or "{}")
          errors = [
              d for d in data.get("generalDiagnostics", [])
              if d.get("severity") == "error"
          ]
          for d in errors:
              start = d["range"]["start"]
              msg = d["message"].splitlines()[0]
              print(
                  f"::warning file={d['file']},line={start['line'] + 1},"
                  f"col={start['character'] + 1}::{msg}"
              )
          print(f"pyright: {len(errors)} issue(s) (advisory, non-blocking)")
          PY
